<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clan</title>
    <link rel="stylesheet" href="../CSS/nav.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/clanPage.css">
</head>

<body>
    <div id="header"></div>
    <main>
        <div id="secondHeader">
            <button id="MT" class="buttonClans">
                <p>MacThomas</p>
            </button>
            <button id="MD" class="buttonClans">
                <p>MacDowall</p>
            </button>
            <button id="MQ" class="buttonClans">
                <p>MacQueen</p>
            </button>
            <button id="ML" class="buttonClans">
                <p>MacLeod</p>
            </button>
            <button id="MK" class="buttonClans">
                <p>MacKinnon</p>
            </button>
        </div>

        <div id="cowInCompetition">
            <h1 id="greatClans">The Great Clans of Scotland</h1>
            <img id="cowsCompeteIMG" src="../pic/Bakgrunder/korTävlar.png" alt="">
        </div>
        <div id="content">

            <div class="DIV-flex">
                <h1 id="clanName"></h1>
                <div id="clanInfo">
                    <div id="history"></div>
                    <div id="clanInfoPictures">
                        <div id="crest"></div>
                        <div id="tartan"></div>
                    </div>
                </div>
            </div>

            <div class="DIV-flex">
                <h3>Clanpoints per month in current season</h3>
                <div id="svgAndInfo">
                    <div id="svgElement"></div>
                    <div id="infobox">
                        <div id="borderBottomDiv">
                            <p>Points</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="DIV-flex">
                <h3>Members</h3>
                <div id="clanMembers"></div>
            </div>

            <div id="popUpCowInfo">
                <div class="overlay"></div>
                <div id="closeButtonDiv">
                    <button id="closeButton">Close</button>
                </div>

                <div id="flexCowinfoAndPic">
                    <div id="cowInfo"></div>
                    <div id="picOnCow"></div>
                </div>


                <div id="seasonSkills">
                    <button id="s1">Season 1</button>
                    <button id="s2">Season 2</button>
                    <button id="s3">Season 3</button>
                    <button id="s4">Season 4</button>
                    <button id="s5">Season 5</button>
                    <button id="s6">Season 6</button>
                    <button id="s7">Season 7</button>
                    <button id="s8">Season 8</button>
                    <button id="s9">Current Season</button>
                </div>

                <div id="h2Div">
                    <h2>Score per dicipline</h2>
                    <h4>Between 10 and 50</h4>
                </div>

                <div id="chart">
                    <div id="chartOne"></div>
                    <div id="chartTwo"></div>
                    <div id="chartThree"></div>
                    <div id="chartFour"></div>
                    <div id="chartFive"></div>
                </div>

                <div id="popupNotCompeting">
                    <p><span id="cowName"></span> did not compete this season.</p>
                </div>

            </div>
        </div>
        <footer></footer>
    </main>

    <script src="../d3.v7.min.js"></script>
    <script src="../dataset.js"></script>
    <script src="../javascript/functions.js"></script>
    <script src="../javascript/header.js"></script>
    <script src="../javascript/claninfo.js"></script>
    <script src="../javascript/clanPage.js"></script>
</body>

</html>

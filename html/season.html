<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seasons</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/season.css">
    <link rel="stylesheet" href="../CSS/fonts.css">
    <link rel="stylesheet" href="../CSS/nav.css">
</head>
<body>
    <div id="header"></div>
    <main>
        <div id="content">
            <h1>SEASON SCORES</h1>
            <div id="filteringBoxes">
                <div id="seasonButtons">
                    <button id="currentSeason" class="filteringBoxesDIV" data-season="0">
                        <p>Current Season</p>
                    </button>
                    <button id="season1" class="filteringBoxesDIV" data-season="1">
                        <p>Season 1</p>
                    </button>
                    <button id="season2" class="filteringBoxesDIV" data-season="2">
                        <p>Season 2</p>
                    </button>
                    <button id="season3" class="filteringBoxesDIV" data-season="3">
                        <p>Season 3</p>
                    </button>
                    <button id="season4" class="filteringBoxesDIV" data-season="4">
                        <p>Season 4</p>
                    </button>
                    <button id="season5" class="filteringBoxesDIV" data-season="5">
                        <p>Season 5</p>
                    </button>
                    <button id="season6" class="filteringBoxesDIV" data-season="6">
                        <p>Season 6</p>
                    </button>
                    <button id="season7" class="filteringBoxesDIV" data-season="7">
                        <p>Season 7</p>
                    </button>
                    <button id="season8" class="filteringBoxesDIV" data-season="8">
                        <p>Season 8</p>
                    </button>
                </div>
            </div>

            <div id="svgElement">
                <svg id="stackedChart"></svg>
                <div id="firstCompetition" class="competitionDiv">
                    <h2>The great Moo-of</h2>
                    <svg id="moo-off"></svg>
                </div>
                <div id="secondCompetition" class="competitionDiv">
                    <h2>Fluff-styling</h2>
                    <svg id="fluff"></svg>
                </div>
                <div id="thirdCompetition" class="competitionDiv">
                    <h2>Mountain-Race</h2>
                    <svg id="mountainRace"></svg>
                </div>

                <div id="fourthCompetition" class="competitionDiv">
                    <h2>Whiskey-Kicking</h2>
                    <svg id="whiskey"></svg>
                </div>

                <div id="fifthCompetition" class="competitionDiv">
                    <h2>The bagpipe test</h2>
                    <svg id="bagpipe"></svg>
                </div>
            </div>
        </div>
    </main>

    <script src="../d3.v7.min.js"></script>
    <script src="../dataset.js"></script>
    <script src="../javascript/functions.js"></script>
    <script src="../javascript/header.js"></script>
    <script src="../javascript/season.js"></script>

</body>
</html>
